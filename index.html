  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Inline Service Worker (registered from blob)
      const swCode = `
        // JARVIS Service Worker - Offline + Installable
        const CACHE_NAME = 'jarvis-v1';
        const urlsToCache = ['./', './index.html'];

        self.addEventListener('install', (event) => {
          event.waitUntil(
            caches.open(CACHE_NAME).then((cache) => {
              console.log('JARVIS: Cache opened');
              return cache.addAll(urlsToCache);
            })
          );
          self.skipWaiting();
        });

        self.addEventListener('activate', (event) => {
          event.waitUntil(
            caches.keys().then((cacheNames) => {
              return Promise.all(
                cacheNames.map((cacheName) => {
                  if (cacheName !== CACHE_NAME) {
                    console.log('JARVIS: Deleting old cache', cacheName);
                    return caches.delete(cacheName);
                  }
                })
              );
            })
          );
          self.clients.claim();
        });

        self.addEventListener('fetch', (event) => {
          event.respondWith(
            fetch(event.request)
              .then((response) => {
                const responseClone = response.clone();
                caches.open(CACHE_NAME).then((cache) => {
                  cache.put(event.request, responseClone);
                });
                return response;
              })
              .catch(() => {
                return caches.match(event.request);
              })
          );
        });
      `;

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const blob = new Blob([swCode], { type: 'application/javascript' });
          const swUrl = URL.createObjectURL(blob);
          
          navigator.serviceWorker.register(swUrl)
            .then(reg => console.log('JARVIS: Service Worker registered from blob'))
            .catch(err => console.log('JARVIS: SW registration skipped (expected for local file)', err.message));
        });
      }
    </script>
